{% extends "_base.html" %}
{% load static %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/shop.css' %}">{% endblock %}
{% block body_class %}shop{% endblock %}

{% block body %}
<header class="site-header">
  <div class="container">
    <a class="brand" href="/">books · bilouro</a>
  </div>
</header>

<main class="container">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="container">
    <small>books.bilouro.com · {% now "Y" %}</small>
  </div>
</footer>
{% endblock %}
