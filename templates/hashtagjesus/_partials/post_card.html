{% load wagtailcore_tags %}
<article class="hj-post-card">
  <time class="hj-post-date" datetime="{{ post.date|date:'c' }}">{{ post.date|date:"j M Y" }}</time>
  <h3 class="hj-post-title"><a href="{% pageurl post %}">{{ post.title }}</a></h3>
  {% if post.intro %}<p class="hj-post-intro">{{ post.intro }}</p>{% endif %}
  <a class="hj-post-more" href="{% pageurl post %}">{{ read_more_label|default:"Ler" }} →</a>
</article>
