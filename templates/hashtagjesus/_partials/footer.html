<footer class="hj-footer">
  <div class="hj-container">
    <div class="hj-footer-divider" aria-hidden="true">† · †</div>
    <div class="hj-footer-row">
      <div class="hj-footer-col">
        <strong class="hj-wordmark">#jesus</strong>
        <p>&copy; {% now "Y" %} · hashtag-jesus</p>
      </div>
      <div class="hj-footer-col">
        <ul>
          {% if legal_url %}<li><a href="{{ legal_url }}">{{ privacy_label|default:"Privacy" }}</a></li>{% endif %}
          <li><a href="/feed/" rel="alternate" type="application/atom+xml">RSS</a></li>
          <li><a href="https://hashtag-jesus.com/">{{ other_languages_label|default:"Other languages" }}</a></li>
        </ul>
      </div>
    </div>
  </div>
</footer>
